<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check OpenAI Key</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 1.25rem;
      color: #111;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: .4rem;
      color: #333;
    }

    textarea {
      width: 100%;
      padding: .65rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: .9rem;
      font-family: monospace;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color .15s;
    }

    textarea:focus { border-color: #6366f1; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: .7rem 1rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover { background: #4f46e5; }

    .result {
      margin-top: 1.25rem;
      padding: .85rem 1rem;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 500;
    }

    .result.active   { background: #d1fae5; color: #065f46; }
    .result.inactive { background: #fee2e2; color: #991b1b; }
    .result.error    { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Check OpenAI Key</h1>
    <form method="POST" action="/check">
      <label for="api_key">Paste your OpenAI API key</label>
      <textarea
        id="api_key"
        name="api_key"
        placeholder="sk-..."
        autocomplete="off"
        spellcheck="false"
        aria-required="true"
      ></textarea>
      <button type="submit">Check Key</button>
    </form>

    {% if message %}
    <div class="result {{ result }}">{{ message }}</div>
    {% endif %}
  </div>
</body>
</html>
